name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;30.0.14904198"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cargo-binstall
        run: cargo install cargo-binstall --locked

      - name: Install cargo-ndk
        run: cargo binstall cargo-ndk --no-confirm

      - name: Restore signing keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_RELEASE_KEYSTORE_PATH"
            echo "ANDROID_RELEASE_KEYSTORE_PATH=$ANDROID_RELEASE_KEYSTORE_PATH" >> "$GITHUB_ENV"
          fi

      - name: Validate signing inputs
        env:
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          [ -n "${ANDROID_RELEASE_KEYSTORE_PATH:-}" ] || { echo "Missing ANDROID_RELEASE_KEYSTORE_BASE64"; exit 1; }
          [ -n "${ANDROID_RELEASE_STORE_PASSWORD:-}" ] || { echo "Missing ANDROID_RELEASE_STORE_PASSWORD"; exit 1; }
          [ -n "${ANDROID_RELEASE_KEY_ALIAS:-}" ] || { echo "Missing ANDROID_RELEASE_KEY_ALIAS"; exit 1; }
          [ -n "${ANDROID_RELEASE_KEY_PASSWORD:-}" ] || { echo "Missing ANDROID_RELEASE_KEY_PASSWORD"; exit 1; }

      - name: Build signed release APKs
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/30.0.14904198
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$ANDROID_RELEASE_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_RELEASE_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_RELEASE_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_RELEASE_KEY_PASSWORD" \
            -Pandroid.injected.signing.store.type=pkcs12

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
